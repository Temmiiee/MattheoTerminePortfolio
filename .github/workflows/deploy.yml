name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifact
        run: |
          mkdir out
          cp index.html img styles.css manifest.webmanifest robots.txt sitemap.xml img/favicon.svg README.md LICENSE out/ -r
      - uses: actions/upload-pages-artifact@v1
        with:
          path: out

  deploy:
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v1
